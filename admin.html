<!DOCTYPE html>
<html>
<head>
    <title>Admin - Smart Import</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="database.js"></script>
</head>
<body>
    <h2>Add/Update College Course</h2>
    <form id="adminForm">
        <input type="text" id="name" placeholder="College Name (e.g. IIT BBS)" required><br><br>
        <input type="text" id="course" placeholder="Course Name (e.g. MBA or B.Tech)" required><br><br>
        <input type="text" id="location" placeholder="Location"><br><br>
        <input type="url" id="image" placeholder="Photo URL (First time only)"><br><br>
        <input type="url" id="website" placeholder="Official Website Link" required><br><br>
        <button type="submit">Import/Update College</button>
    </form>

    <script>
        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const collegeName = document.getElementById('name').value;
            const newCourse = {
                name: document.getElementById('course').value,
                fees: "Fetching...",
                status: "Pending"
            };

            const collegeData = {
                name: collegeName,
                location: document.getElementById('location').value,
                image: document.getElementById('image').value || "https://via.placeholder.com/300",
                website: document.getElementById('website').value,
                courses: firebase.firestore.FieldValue.arrayUnion(newCourse)
            };

            try {
                // Merge: true se purana data delete nahi hoga, naya course jud jayega
                await db.collection("colleges").doc(collegeName).set(collegeData, { merge: true });
                alert("Success! " + newCourse.name + " added to " + collegeName);
                e.target.reset();
            } catch (err) { alert("Error: " + err.message); }
        };
    </script>
</body>
</html>
