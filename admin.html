<!DOCTYPE html>
<html>
<head>
    <title>Admin - Import College</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="database.js"></script>
</head>
<body>
    <h2>Add New College (Blank Template)</h2>
    <form id="adminForm">
        <input type="text" id="name" placeholder="College Name" required><br><br>
        <input type="text" id="location" placeholder="Location (e.g. Bhubaneswar)"><br><br>
        <input type="url" id="website" placeholder="Website Link (For Scraper)" required><br><br>
        <button type="submit">Import to Database</button>
    </form>

    <script>
        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                website: document.getElementById('website').value,
                status: "Pending Scrape"
            };
            try {
                await db.collection("colleges").add(data);
                alert("College Imported! Scraper can now pick the link.");
                e.target.reset();
            } catch (err) { alert("Error: " + err.message); }
        };
    </script>
</body>
</html>
